services:
  web:
    build:
      context: .
    image: scout-site:dev
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SESSION_COOKIE_SECURE: "false"
      DJANGO_CSRF_COOKIE_SECURE: "false"
      DB_ENGINE: sqlite
      SQLITE_PATH: /app/scoutikf/db.sqlite3
    volumes:
      - ./scoutikf:/app/scoutikf
