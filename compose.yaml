name: scout-site

services:
  web:
    image: ${SCOUT_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${SCOUT_HOST_PORT:-8010}:8000"
    volumes:
      - ./docker-data/static:/app/scoutikf/staticfiles
      - ./docker-data/media:/app/scoutikf/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  default:
    name: scout-site_default
    ipam:
      config:
        - subnet: 172.19.0.0/16
