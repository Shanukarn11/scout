name: Build and publish container

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: scout-site:test
      - name: Validate image
        run: |
          docker run --rm -e DJANGO_DEBUG=true -e DB_ENGINE=sqlite scout-site:test python -m pip check
          docker run --rm -e DJANGO_DEBUG=true -e DB_ENGINE=sqlite scout-site:test python -m compileall -q manage.py scoutikf registration dashboard login coachlogin teams
          docker run --rm -e DJANGO_DEBUG=true -e DB_ENGINE=sqlite scout-site:test python manage.py check
          docker run --rm -e DJANGO_DEBUG=true -e DB_ENGINE=sqlite scout-site:test python manage.py makemigrations --check --dry-run
          docker run --rm -e DJANGO_DEBUG=true -e DB_ENGINE=sqlite scout-site:test python manage.py test
      - uses: docker/build-push-action@v6
        if: github.event_name != 'pull_request'
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scout-site:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/scout-site:latest
